<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff3e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="20" fill="url(#bg)"/>

  <!-- Wheelchair -->
  <g transform="translate(60, 120)">
    <circle cx="50" cy="100" r="35" fill="none" stroke="#1D2C5C" stroke-width="5"/>
    <circle cx="50" cy="100" r="6" fill="#1D2C5C"/>
    <rect x="30" y="40" width="40" height="8" rx="4" fill="#27AE4A"/>
    <rect x="30" y="40" width="6" height="55" rx="3" fill="#6c757d"/>
    <rect x="64" y="40" width="6" height="55" rx="3" fill="#6c757d"/>
    <rect x="25" y="30" width="50" height="8" rx="4" fill="#1D2C5C"/>
  </g>

  <!-- Hospital Bed -->
  <g transform="translate(180, 150)">
    <rect x="0" y="30" width="140" height="60" rx="6" fill="#e3f2fd" stroke="#1D2C5C" stroke-width="3"/>
    <rect x="0" y="30" width="40" height="60" rx="6" fill="#bbdefb" stroke="#1D2C5C" stroke-width="3"/>
    <rect x="-5" y="90" width="10" height="30" rx="3" fill="#6c757d"/>
    <rect x="135" y="90" width="10" height="30" rx="3" fill="#6c757d"/>
    <circle cx="0" cy="125" r="7" fill="#1D2C5C"/>
    <circle cx="140" cy="125" r="7" fill="#1D2C5C"/>
    <!-- Pillow -->
    <rect x="5" y="38" width="30" height="15" rx="6" fill="#fff" stroke="#27AE4A" stroke-width="1.5"/>
  </g>

  <!-- Oxygen Concentrator -->
  <g transform="translate(370, 100)">
    <rect x="0" y="20" width="60" height="100" rx="10" fill="#e8f5e9" stroke="#27AE4A" stroke-width="3"/>
    <circle cx="30" cy="55" r="15" fill="#27AE4A" opacity="0.3"/>
    <text x="30" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#27AE4A">O2</text>
    <rect x="15" y="85" width="30" height="8" rx="3" fill="#27AE4A"/>
    <rect x="20" y="98" width="20" height="6" rx="3" fill="#6c757d"/>
    <!-- Wheels -->
    <circle cx="12" cy="125" r="6" fill="#1D2C5C"/>
    <circle cx="48" cy="125" r="6" fill="#1D2C5C"/>
  </g>

  <!-- Medical cross -->
  <g transform="translate(220, 40)">
    <circle cx="30" cy="30" r="28" fill="#27AE4A" opacity="0.15"/>
    <rect x="22" y="12" width="16" height="36" rx="3" fill="#27AE4A"/>
    <rect x="12" y="22" width="36" height="16" rx="3" fill="#27AE4A"/>
  </g>

  <!-- Tagline -->
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1D2C5C">Quality Medical Equipment</text>
  <text x="250" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6c757d">Affordable Rental Services Across Uganda</text>
</svg>